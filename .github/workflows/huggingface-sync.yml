name: Sync Backend to Hugging Face Hub

on:
  push:
    branches: 
      - master
      - main
    # Only trigger when files in the backend change
    paths:
      - 'backend/**'
      - '.github/workflows/huggingface-sync.yml'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # To fetch all history for all branches and tags
          lfs: true
      
      - name: Push backend folder to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Use a shallow deploy to avoid pushing large file history to Hugging Face
          mkdir -p /tmp/hf-deploy
          cp -r backend/* /tmp/hf-deploy/
          cd /tmp/hf-deploy
          
          git init
          git add .
          git commit -m "Deploy from GitHub Actions"
          
          git push https://aatmman:$HF_TOKEN@huggingface.co/spaces/aatmman/intelli-credit-backend master:main --force
